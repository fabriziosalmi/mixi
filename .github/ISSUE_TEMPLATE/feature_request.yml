name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        We appreciate feature suggestions. Please describe your idea clearly so we can evaluate it.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What workflow would it improve?
      placeholder: "When I'm mixing two tracks with different BPMs, I need to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How do you envision this working?
    validations:
      required: true

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Audio engine
        - UI / UX
        - Mobile
        - Effects
        - Instruments (Groovebox / TurboKick / TurboBass)
        - MIDI / Controllers
        - Skins / Theming
        - AutoMixer (AI)
        - Documentation
        - Developer experience
        - Other

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Have you considered other approaches or workarounds?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to submit a PR for this feature
