name: Test Gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ── TypeScript + Unit Tests + Build ────────────────────────
  test-js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Install Rust + wasm-pack (for TS type declarations)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Build Wasm types
        run: |
          cargo install wasm-pack --locked || true
          cd mixi-core && wasm-pack build --target web --out-dir pkg

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test

      - name: Vite build
        run: npx vite build

  # ── Rust DSP Tests ─────────────────────────────────────────
  test-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Rust tests (mixi-core)
        run: cd mixi-core && cargo test

      - name: Rust release build check
        run: cd mixi-core && cargo build --release

      - name: Wasm build check
        run: |
          cargo install wasm-pack --locked || true
          cd mixi-core && wasm-pack build --target web --out-dir pkg

  # ── E2E Smoke Tests (Playwright) ───────────────────────────
  # Optional: may fail in CI due to headless browser limitations
  test-e2e:
    runs-on: ubuntu-latest
    needs: test-js
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install deps
        run: npm install --no-audit --no-fund

      - name: Build for preview
        run: npx vite build

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npx playwright test

      - name: Upload test artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7
